<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <script>
        // Redirigir todas las rutas a index.html
        var path = window.location.pathname.replace(/\/$/, '');
        var redirect = path + (window.location.search || '') + (window.location.hash || '');
        window.location.replace('/plataformash/index.html?redirect=' + encodeURIComponent(redirect));
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
