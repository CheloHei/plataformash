<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <script>
        // Guardar la ruta que se intentó acceder
        var l = window.location;
        var pathname = l.pathname;
        var search = l.search;
        var hash = l.hash;
        
        // Guardar en sessionStorage para que index.html lo pueda leer
        sessionStorage.setItem('redirect', pathname + search + hash);
        
        // Redirigir a index.html
        window.location.replace('/plataformash/');
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
